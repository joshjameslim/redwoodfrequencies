<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="description" content="Redwood Frequencies is an ambient outdoor concert series in the redwoods of Joaquin Miller Park, Oakland, CA. Next show: Sunday, July 26 at 4 PM.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

<script>
(function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[]).push(arguments);},
l=d.createElement(e),l.async=1,l.src=u,n=d.getElementsByTagName(e)[0],
n.parentNode.insertBefore(l,n);})
(window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
ml('account', '2487048');

function rfOpenModal() {
  document.getElementById('rf-modal').hidden = false;
  document.body.classList.add('ml-open');
  rfMatchCardColor();
}

// Sample the MailerLite form's own background color and paint the card with
// it, so the padding around the form is a perfect match.
function rfMatchCardColor(attempt) {
  attempt = attempt || 0;
  var card = document.querySelector('.rf-modal-card');
  var nodes = document.querySelectorAll('.rf-modal-card .ml-embedded, .rf-modal-card .ml-embedded *');
  for (var i = 0; i < nodes.length; i++) {
    var bg = getComputedStyle(nodes[i]).backgroundColor;
    if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)') {
      card.style.background = bg;
      return;
    }
  }
  if (attempt < 40) setTimeout(function () { rfMatchCardColor(attempt + 1); }, 150);
}
function rfCloseModal() {
  document.getElementById('rf-modal').hidden = true;
  document.body.classList.remove('ml-open');
}
document.addEventListener('keydown', function (ev) {
  if (ev.key === 'Escape' || ev.keyCode === 27) rfCloseModal();
});
</script>

<style>
  html, body { margin: 0; padding: 0; background: #1d1630; }
  body { font-family: 'DM Sans', sans-serif; }
  .hero { position: relative; min-height: 100dvh; overflow: hidden; display: flex; transition: filter 0.15s ease; }
  body.ml-open .hero { filter: blur(24px); }
  .bg {
    position: absolute; left: -8%; top: -8%; width: 116%; height: 116%;
    object-fit: cover;
    filter: blur(14px) brightness(1.05) saturate(1.05);
  }
  .overlay {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, oklch(0.25 0.07 305 / 0.45) 0%, oklch(0.25 0.05 310 / 0.3) 40%, oklch(0.18 0.06 300 / 0.6) 100%);
  }
  .content {
    position: relative; width: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 24px; text-align: center; box-sizing: border-box;
  }
  .eyebrow {
    color: oklch(0.93 0.02 310); font-size: clamp(12px, 1.6vw, 15px);
    font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase;
  }
  h1 {
    margin: 20px 0 0; width: min(100%, 640px); aspect-ratio: 2389.64 / 660.32;
    background: #f5f2f8;
    -webkit-mask-image: url('assets/rf-logo.svg');
    -webkit-mask-position: center;
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-image: url('assets/rf-logo.svg');
    mask-position: center;
    mask-size: contain;
    mask-repeat: no-repeat;
  }
  .date { margin-top: 22px; color: oklch(0.93 0.02 310); font-size: clamp(18px, 2.2vw, 22px); font-weight: 500; }
  .place { margin-top: 6px; color: oklch(0.8 0.03 310); font-size: clamp(15px, 1.8vw, 17px); }
  .buttons { margin-top: 34px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .btn {
    display: inline-flex; align-items: center; height: 52px; padding: 0 34px;
    border-radius: 999px; font-size: 17px; text-decoration: none; transition: all 0.2s ease; cursor: pointer;
  }
  .btn-rsvp {
    border: 1.5px solid oklch(0.75 0.06 130 / 0.7); color: oklch(0.9 0.04 130); font-weight: 600;
    background: oklch(0.14 0.04 130 / 0.65); backdrop-filter: blur(6px);
  }
  .btn-rsvp:hover { border-color: oklch(0.87 0.07 130); background: oklch(0.22 0.06 130 / 0.75); }
  .btn-email {
    border: 1.5px solid oklch(0.75 0.06 130 / 0.7); color: oklch(0.9 0.04 130); font-weight: 500;
    background: oklch(0.14 0.04 130 / 0.65); backdrop-filter: blur(6px);
  }
  .btn-email:hover { border-color: oklch(0.87 0.07 130); background: oklch(0.22 0.06 130 / 0.75); }
  .rf-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .rf-modal[hidden] { display: none; }
  .rf-modal-backdrop { position: absolute; inset: 0; background: oklch(0.12 0.03 300 / 0.55); }
  .rf-modal-card {
    position: relative; background: #3e6d19; border-radius: 16px;
    width: fit-content; max-width: calc(100vw - 40px); max-height: 85dvh; overflow: hidden auto;
    padding: 14px; box-shadow: 0 24px 64px rgb(0 0 0 / 0.45);
  }
  .rf-modal-card .ml-embedded { display: block; margin: 0 auto; }
  .rf-modal-close {
    position: absolute; top: 10px; right: 10px; z-index: 1;
    width: 36px; height: 36px; border: none; border-radius: 50%;
    background: rgb(0 0 0 / 0.18); color: #fff; font-size: 24px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .rf-modal-close:hover { background: rgb(0 0 0 / 0.35); }
</style>
</head>
<body>
<div class="hero">
  <img class="bg" src="assets/grove-small.jpg" alt="">
  <div class="overlay"></div>
  <div class="content">
    <div class="eyebrow">An ambient concert series</div>
    <h1 role="img" aria-label="Redwood Frequencies"></h1>
    <div class="date">Sunday, July 26 · 4 PM</div>
    <div class="place">Joaquin Miller Park · Oakland, CA</div>
    <div class="buttons">
      <a class="btn btn-rsvp" role="button" tabindex="0" onclick="window.open('https://partiful.com/e/P9S4rC9a5vqi7MSnFMXf','_blank','noopener')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.open('https://partiful.com/e/P9S4rC9a5vqi7MSnFMXf','_blank','noopener')}">RSVP on Partiful</a>
      <a class="btn btn-email" role="button" tabindex="0" onclick="rfOpenModal()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();rfOpenModal()}">Join the email list</a>
    </div>
  </div>
</div>
<div class="rf-modal" id="rf-modal" hidden>
  <div class="rf-modal-backdrop" onclick="rfCloseModal()"></div>
  <div class="rf-modal-card" role="dialog" aria-modal="true" aria-label="Join the email list">
    <button class="rf-modal-close" type="button" onclick="rfCloseModal()" aria-label="Close">&#215;</button>
    <div class="ml-embedded" data-form="uAOX4q"></div>
  </div>
</div>
</body>
</html>
